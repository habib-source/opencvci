name: test opencv build on macos

on: push

jobs:
  run-ci:
    runs-on: macos-26
    steps:
    - name: Checkout Forked OpenCV
      uses: actions/checkout@v4
      with:
        repository: 'habib-source/opencv'
        ref: 'FindPythoncmake20'
    - name: Set Xcode Python as Default
      run: |
        # Locate active Xcode Developer directory and prepend its usr/bin to PATH
        XCODE_PATH="$(xcode-select -p)/usr/bin"
        echo "$XCODE_PATH" >> $GITHUB_PATH
    - name: Verify Environment
      run: |
        which python3
        xcodebuild -version
    - name: install numpy
      run: python3 -m pip install numpy
    - name: Run OpenCV CMake Configuration
      run: cmake -B build -DPython3_FIND_UNVERSIONED_NAMES=FIRST -DBUILD_opencv_python3=ON -DBUILD_opencv_java=OFF -DINSTALL_CREATE_DISTRIB=ON -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF -DBUILD_DOCS=OFF -DPython3_LIMITED_API=ON -DBUILD_OPENEXR=ON
