name: test opencv build on macos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run-ci:
    runs-on: macos-26
    steps:
    - name: Checkout Forked OpenCV
      uses: actions/checkout@v4
      with:
        repository: 'habib-source/opencv'
        ref: '117472b4378dd0663839c1bc6846f6b8f9e859a6'
    - name: Delete all python vertions except xcode python
      run: |
        brew uninstall --ignore-dependencies python3
        sudo rm -rf /opt/homebrew/Frameworks/Python.framework/
        sudo rm -rf /opt/homebrew/pyth*
        sudo rm -rf /Library/Frameworks/Python.framework/Versions/*
    - name: Verify Environment
      run: |
        which python3
        xcodebuild -version
    - name: install numpy
      run: python3 -m pip install numpy
    - name: Run OpenCV CMake Configuration
      run: cmake -B build -DBUILD_opencv_python3=ON -DBUILD_opencv_java=OFF -DINSTALL_CREATE_DISTRIB=ON -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF -DBUILD_DOCS=OFF -DPython3_LIMITED_API=ON -DBUILD_OPENEXR=ON -DOPENCV_Python3_INSTALL_PATH=python
