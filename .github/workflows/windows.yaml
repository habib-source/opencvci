name: test opencv build on windows

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  run-ci:
    runs-on: windows-2025
    steps:
    - name: Checkout Forked OpenCV
      uses: actions/checkout@v4
      with:
        repository: 'habib-source/opencv'
        ref: 'FindPython'
    - name: install numpy
      run: python3 -m pip install numpy
    - name: Run OpenCV CMake Configuration
      run: cmake -B build -DBUILD_opencv_python3=ON -DBUILD_opencv_python2=OFF -DBUILD_opencv_java=OFF -DINSTALL_CREATE_DISTRIB=ON -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF -DBUILD_DOCS=OFF -DPython3_LIMITED_API=ON -DBUILD_OPENEXR=ON -DOPENCV_Python3_INSTALL_PATH=python
    - name: check for chared lib
      run: python3 -c "import numpy; print(numpy.get_include());from sysconfig import *; print(get_path('purelib'))"
